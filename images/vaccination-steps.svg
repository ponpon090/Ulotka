<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27AE60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#F0F8FF"/>

  <!-- Step 1: Immunizacja -->
  <g id="step1">
    <circle cx="100" cy="150" r="50" fill="url(#stepGrad)" stroke="#27AE60" stroke-width="2"/>
    <text x="100" y="165" font-size="40" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">1</text>
    
    <!-- Strzykawka -->
    <line x1="130" y1="100" x2="160" y2="70" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
    <circle cx="165" cy="65" r="8" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2"/>
    
    <text x="100" y="230" font-size="16" font-weight="bold" text-anchor="middle" fill="#27AE60" font-family="Arial">Immunizacja</text>
    <text x="100" y="250" font-size="12" text-anchor="middle" fill="#666" font-family="Arial">Wstrzyknięcie</text>
    <text x="100" y="265" font-size="12" text-anchor="middle" fill="#666" font-family="Arial">osłabionego wirusa</text>
  </g>

  <!-- Step 2: Rozpoznanie -->
  <g id="step2">
    <circle cx="300" cy="150" r="50" fill="url(#stepGrad)" stroke="#27AE60" stroke-width="2"/>
    <text x="300" y="165" font-size="40" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">2</text>
    
    <!-- Lupa/Rozpoznanie -->
    <circle cx="320" cy="130" r="20" fill="none" stroke="#FFD700" stroke-width="3"/>
    <line x1="335" y1="145" x2="350" y2="160" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <!-- Geny/DNA wewnątrz -->
    <path d="M 310 120 Q 320 125 310 130" fill="none" stroke="#FFD700" stroke-width="2"/>
    <path d="M 330 120 Q 320 125 330 130" fill="none" stroke="#FFD700" stroke-width="2"/>
    
    <text x="300" y="230" font-size="16" font-weight="bold" text-anchor="middle" fill="#27AE60" font-family="Arial">Rozpoznanie</text>
    <text x="300" y="250" font-size="12" text-anchor="middle" fill="#666" font-family="Arial">Układ odpornościowy</text>
    <text x="300" y="265" font-size="12" text-anchor="middle" fill="#666" font-family="Arial">poznaje zagrożenie</text>
  </g>

  <!-- Step 3: Wytworzenie Obrony -->
  <g id="step3">
    <circle cx="500" cy="150" r="50" fill="url(#stepGrad)" stroke="#27AE60" stroke-width="2"/>
    <text x="500" y="165" font-size="40" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">3</text>
    
    <!-- Przeciwciała -->
    <circle cx="500" cy="130" r="12" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
    <circle cx="485" cy="145" r="10" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
    <circle cx="515" cy="145" r="10" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
    <!-- Promienie -->
    <line x1="500" y1="115" x2="500" y2="95" stroke="#FFD700" stroke-width="2"/>
    <line x1="520" y1="135" x2="535" y2="135" stroke="#FFD700" stroke-width="2"/>
    
    <text x="500" y="230" font-size="16" font-weight="bold" text-anchor="middle" fill="#27AE60" font-family="Arial">Wytworzenie Obrony</text>
    <text x="500" y="250" font-size="12" text-anchor="middle" fill="#666" font-family="Arial">Tworzenie przeciwciał</text>
    <text x="500" y="265" font-size="12" text-anchor="middle" fill="#666" font-family="Arial">i limfocytów</text>
  </g>

  <!-- Step 4: Pamięć -->
  <g id="step4">
    <circle cx="700" cy="150" r="50" fill="url(#stepGrad)" stroke="#27AE60" stroke-width="2"/>
    <text x="700" y="165" font-size="40" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">4</text>
    
    <!-- Mózg/Pamięć -->
    <circle cx="700" cy="130" r="18" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
    <!-- Fale mózgowe -->
    <path d="M 715 115 Q 725 120 715 125" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
    <path d="M 720 110 Q 735 118 720 126" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
    <path d="M 725 105 Q 745 116 725 127" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
    
    <text x="700" y="230" font-size="16" font-weight="bold" text-anchor="middle" fill="#27AE60" font-family="Arial">Pamięć Immunol.</text>
    <text x="700" y="250" font-size="12" text-anchor="middle" fill="#666" font-family="Arial">Organizm pamięta</text>
    <text x="700" y="265" font-size="12" text-anchor="middle" fill="#666" font-family="Arial">i walczy szybciej</text>
  </g>

  <!-- Strzałki pomiędzy krokami -->
  <g id="arrows">
    <path d="M 150 150 L 250 150" fill="none" stroke="#2E7D32" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <path d="M 350 150 L 450 150" fill="none" stroke="#2E7D32" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <path d="M 550 150 L 650 150" fill="none" stroke="#2E7D32" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Marker dla strzałek -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E7D32" />
    </marker>
  </defs>

  <!-- Tekst na dole -->
  <text x="400" y="520" font-size="24" font-weight="bold" text-anchor="middle" fill="#2E7D32" font-family="Arial">
    Jak Działają Szczepienia
  </text>
  <text x="400" y="560" font-size="14" text-anchor="middle" fill="#666" font-family="Arial">
    4 etapy ochrony immunologicznej
  </text>
</svg>
