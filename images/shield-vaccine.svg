<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="virusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#E8F4F8"/>

  <!-- Osłona/Tarcza -->
  <path d="M 400 80 L 250 180 L 250 350 Q 250 450 400 520 Q 550 450 550 350 L 550 180 Z" fill="url(#shieldGrad)" stroke="#1E90FF" stroke-width="3"/>
  
  <!-- Krzyż na tarczy -->
  <rect x="370" y="150" width="60" height="200" fill="white" opacity="0.8"/>
  <rect x="300" y="220" width="200" height="60" fill="white" opacity="0.8"/>

  <!-- Krople wirusa (po lewej) -->
  <g id="virus1">
    <circle cx="150" cy="150" r="30" fill="url(#virusGrad)" opacity="0.7"/>
    <circle cx="140" cy="140" r="8" fill="#FF4444"/>
    <circle cx="160" cy="145" r="8" fill="#FF4444"/>
    <circle cx="155" cy="165" r="8" fill="#FF4444"/>
    <circle cx="140" cy="165" r="8" fill="#FF4444"/>
  </g>

  <!-- Krople wirusa (po prawej) -->
  <g id="virus2">
    <circle cx="650" cy="200" r="35" fill="url(#virusGrad)" opacity="0.7"/>
    <circle cx="640" cy="185" r="9" fill="#FF4444"/>
    <circle cx="665" cy="190" r="9" fill="#FF4444"/>
    <circle cx="660" cy="215" r="9" fill="#FF4444"/>
    <circle cx="635" cy="210" r="9" fill="#FF4444"/>
  </g>

  <!-- Strzykawka -->
  <g id="syringe">
    <rect x="450" y="420" width="80" height="15" rx="7" fill="#E8E8E8" stroke="#666" stroke-width="2"/>
    <polygon points="530,413 560,420 530,427" fill="#999" stroke="#666" stroke-width="1"/>
    <rect x="440" y="423" width="15" height="50" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2"/>
  </g>

  <!-- Liście (dekoracja) -->
  <g id="leaf1">
    <path d="M 100 500 Q 80 480 60 500" fill="none" stroke="#27AE60" stroke-width="3" stroke-linecap="round"/>
    <path d="M 65 495 L 60 500 L 65 505" fill="#27AE60"/>
  </g>

  <g id="leaf2">
    <path d="M 700 520 Q 720 500 740 520" fill="none" stroke="#27AE60" stroke-width="3" stroke-linecap="round"/>
    <path d="M 735 515 L 740 520 L 735 525" fill="#27AE60"/>
  </g>

  <!-- Tekst główny -->
  <text x="400" y="560" font-size="36" font-weight="bold" text-anchor="middle" fill="#2E7D32" font-family="Arial">
    Szczepienia Chronią
  </text>
</svg>
