svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" /
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" /
    </linearGradient
  </defs
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#grad1)"/
  
  <!-- Kolumna lewa - Rodzina -->
  <g id="family"
    <!-- Dom -->
    <rect x="50" y="150" width="150" height="120" fill="#D2691E" stroke="#8B4513" stroke-width="2"/
    <polygon points="50,150 125,80 200,150" fill="#CD853F" stroke="#8B4513" stroke-width="2"/
    
    <!-- Okno 1 -->
    <rect x="70" y="170" width="30" height="30" fill="#87CEEB" stroke="#8B4513" stroke-width="1"/
    <line x1="85" y1="170" x2="85" y2="200" stroke="#8B4513" stroke-width="1"/
    <line x1="70" y1="185" x2="100" y2="185" stroke="#8B4513" stroke-width="1"/
    
    <!-- Okno 2 -->
    <rect x="130" y="170" width="30" height="30" fill="#87CEEB" stroke="#8B4513" stroke-width="1"/
    <line x1="145" y1="170" x2="145" y2="200" stroke="#8B4513" stroke-width="1"/
    <line x1="130" y1="185" x2="160" y2="185" stroke="#8B4513" stroke-width="1"/
    
    <!-- Drzwi -->
    <rect x="105" y="220" width="40" height="50" fill="#654321" stroke="#8B4513" stroke-width="1"/
    <circle cx="140" cy="245" r="3" fill="#FFD700"/
    
    <!-- Kominek -->
    <rect x="155" y="200" width="30" height="50" fill="#696969" stroke="#8B4513" stroke-width="1"/
    <ellipse cx="170" cy="195" rx="12" ry="8" fill="#A9A9A9"/
  /g
  
  <!-- Rodzina przed domem -->
  <g id="people"
    <!-- Dziadek -->
    <circle cx="70" cy="100" r="12" fill="#D2B48C" stroke="#8B4513" stroke-width="1"/
    <line x1="70" y1="112" x2="65" y2="140" stroke="#8B4513" stroke-width="2"/
    <line x1="70" y1="112" x2="75" y2="140" stroke="#8B4513" stroke-width="2"/
    <line x1="65" y1="120" x2="50" y2="130" stroke="#8B4513" stroke-width="2"/
    <line x1="75" y1="120" x2="90" y2="130" stroke="#8B4513" stroke-width="2"/
    
    <!-- Babcia -->
    <circle cx="130" cy="95" r="12" fill="#F4A460" stroke="#8B4513" stroke-width="1"/
    <line x1="130" y1="107" x2="125" y2="135" stroke="#DC143C" stroke-width="2"/
    <line x1="130" y1="107" x2="135" y2="135" stroke="#DC143C" stroke-width="2"/
    <line x1="125" y1="115" x2="110" y2="125" stroke="#8B4513" stroke-width="2"/
    <line x1="135" y1="115" x2="150" y2="125" stroke="#8B4513" stroke-width="2"/
    
    <!-- Dziewczynka -->
    <circle cx="90" cy="50" r="10" fill="#FFB6C1" stroke="#8B4513" stroke-width="1"/
    <line x1="90" y1="60" x2="85" y2="85" stroke="#8B4513" stroke-width="2"/
    <line x1="90" y1="60" x2="95" y2="85" stroke="#8B4513" stroke-width="2"/
    <line x1="85" y1="68" x2="70" y2="78" stroke="#8B4513" stroke-width="2"/
    <line x1="95" y1="68" x2="110" y2="78" stroke="#8B4513" stroke-width="2"/
  /g
  
  <!-- Serce środku -->
  <g id="heart"
    <path d="M 400 350 L 410 330 Q 420 320 425 325 Q 430 320 440 330 L 450 350 Q 450 370 425 385 Q 400 370 400 350 M 400 350 L 390 330 Q 380 320 375 325 Q 370 320 360 330 L 350 350 Q 350 370 375 385 Q 400 370 400 350" fill="#FF1493" stroke="#DC143C" stroke-width="2"/
  /g
  
  <!-- Tekst górny -->
  <text x="400" y="500" font-size="32" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial"
    Szczepienia to Ochrona
  </text
  <text x="400" y="540" font-size="24" text-anchor="middle" fill="#FFD700" font-family="Arial"
    Siebie i Swoich Bliskich
  </text
</svg